spring:
    web:
        resources:
            static-locations: file:${user.avatar.path},classpath:/static/
    application:
        name: kuromi
    servlet:
        multipart:
            max-file-size: 500MB
            max-request-size: 500MB
    datasource:
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://localhost:3306/kuromi?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
        username: root
        password: 123asdjkl
        druid:
            initial-size: 5
            min-idle: 5
            max-active: 20
            max-wait: 60000
            time-between-eviction-runs-millis: 60000
            min-evictable-idle-time-millis: 300000
            validation-query: SELECT 1
            test-while-idle: true
            test-on-borrow: false
            test-on-return: false
            stat-view-servlet:
                enabled: true
                url-pattern: /druid/*
                login-username: admin
                login-password: 123456
                allow: 127.0.0.1
            filter:
                stat:
                    enabled: true
                wall:
                    enabled: true

server:
    port: 8080
    servlet:
        context-path: /api

mybatis-plus:
    mapper-locations: classpath:mapper/*.xml
    type-aliases-package: com.example.kuromi.entity
    configuration:
        map-underscore-to-camel-case: true
        log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

alipay:
    appId: 9021000162605057
    privateKey: 
    alipayPublicKey: 
    gatewayUrl: https://openapi-sandbox.dl.alipaydev.com/gateway.do

user:
    avatar:
        path: D:/project/avatar/

note:
    img:
        path: D:/project/noteimg/